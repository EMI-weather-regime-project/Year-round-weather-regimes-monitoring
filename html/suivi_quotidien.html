<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi quotidien</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- Menu de navigation -->
        <nav>
            <ul>
                <li><a href="menu.html">Accueil - Documentation</a></li>
                <li><a href="cartes_composites.html">Cartes composites</a></li>
                <li><a href="suivi_quotidien.html">Suivi quotidien</a></li>
                <li><a href="suivi_climatique.html">Suivi climatique</a></li>
            </ul>
        </nav>
        <!-- Titre Principal -->
        <h1 class="main-title">Suivi Quotidien des Régimes de Temps Toutes Saisons</h1>

        <div class="selector-wrapper">
            <!-- 2. Titre du Sélecteur -->
            <div class="selector-label">Accéder aux archives</div>
            <!-- Barre horizontale (Sélecteur) -->
            <div class="slider-bar">
                
                <div class="form-group">
                    <label for="annee">Année</label>
                    <select id="annee" name="annee">
                        <option value="" disabled selected>-- Choix --</option>
                        <!-- Les années seront ajoutées ici automatiquement par le script -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="mois">Mois</label>
                    <select id="mois" name="mois">
                        <option value="" disabled selected>-- Choix --</option>
                        <option value="01">Janvier</option>
                        <option value="02">Février</option>
                        <option value="03">Mars</option>
                        <option value="04">Avril</option>
                        <option value="05">Mai</option>
                        <option value="06">Juin</option>
                        <option value="07">Juillet</option>
                        <option value="08">Août</option>
                        <option value="09">Septembre</option>
                        <option value="10">Octobre</option>
                        <option value="11">Novembre</option>
                        <option value="12">Décembre</option>
                        <option value="tous">Tous</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="donnees">Données</label>
                    <select id="donnees" name="donnees">
                        <option value="" disabled selected>-- Choix --</option>
                        <option value="ERA5" selected>ERA5</option>
                        <option value="AnaCEP">Analyse CEP</option>
                    </select>
                </div>
                <button type="button" id="btnValider">Valider</button>
            </div>
            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    // --- 1. Gestion des Années (Génération automatique) ---
                    const selectAnnee = document.getElementById('annee');
                    const selectMois = document.getElementById('mois');
                    const selectDonnee = document.getElementById('donnees');

                    
                    const anneeDebut = 1960;
                    const dateActuelle = new Date();
                    const anneeFin = dateActuelle.getFullYear(); 
                    const moisActuel = dateActuelle.getMonth() + 1; 

                    // Boucle pour créer les options d'années
                    for (let annee = anneeFin; annee >= anneeDebut; annee--) {
                        const option = document.createElement('option');
                        option.value = annee;
                        option.textContent = annee;
                        
                        // Sélectionner l'année actuelle par défaut
                        if (annee === anneeFin) {
                            option.selected = true;
                        }
                        selectAnnee.appendChild(option);
                    }

                    // --- 2. Gestion du Mois (Sélection du mois actuel) ---
                    // On formate le mois avec un zéro devant si nécessaire (ex: 5 -> "05")
                    const moisFormate = String(moisActuel).padStart(2, '0');
                    selectMois.value = moisFormate;

                    const donnee = selectDonnee.value  // selectionne direct la value du type de données pour l'affichage automatique
                    // --- 3. Affichage automatique de l'image par défaut ---
                    
                    // Récupération des éléments d'affichage
                    const imgElementBase = document.getElementById('image-composite');
                    const errorElementBase = document.getElementById('error-msg');

                    if (imgElementBase) {
                        // Construction du chemin
                        const nomFichierBase = `../archives/images_monitoring/${donnee}/${anneeFin}_${moisFormate}.png`;
                        
                        // Assignation de la source
                        imgElementBase.src = nomFichierBase;

                        // Gestion du chargement réussi
                        imgElementBase.onload = function() {
                            imgElementBase.style.display = "block";
                            imgElementBase.style.cursor = "zoom-in"; 
                            if(errorElementBase) errorElementBase.style.display = "none";
                            console.log("Image du mois chargé : " + nomFichierBase);
                        };

                        // Gestion de l'erreur si fichier introuvable
                        imgElementBase.onerror = function() {
                            imgElementBase.style.display = "none";
                            if(errorElementBase) {
                                errorElementBase.style.display = "block";
                                errorElementBase.textContent = "Image non disponible pour le mois actuel (" + anneeFin + "-" + moisFormate + ").";
                            }
                            console.error("Image non trouvée : " + nomFichierBase);
                        };
                    } else {
                        console.error("Erreur : L'élément HTML avec l'ID 'image-monitoring-base' est introuvable.");
                    }
                });
            </script>
            <!-- Message d'erreur (caché par défaut) -->
            <p id="error-msg" class="error-msg">Désolé, cette image n'existe pas encore.</p>
            <!-- Image de résultat (cachée par défaut) -->
            <img id="image-composite" src="" alt="Composite Regimes de temps">
        </div>
    </div>
    <!-- La Modale (Zoom)-->
    <div id="imageModal" class="image-modal">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="imgZoomed" alt="Vue agrandie"> 
    </div>
    <!-- en javascript, recuperer dans des variables l'année, le mois et le type de données puis rediriger vers la bonne image lorsqu'on appuie sur valider-->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- 1. Sélection des éléments ---
            const btnValider = document.getElementById('btnValider');
            const imgElement = document.getElementById('image-composite');
            const errorElement = document.getElementById('error-msg');
            
            // Éléments de la modale (Zoom)
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('imgZoomed');
            const closeBtn = document.querySelector('.close-btn');

            // --- 2. Fonction de validation (Clic sur le bouton) ---
            if (btnValider) {
                btnValider.addEventListener('click', function() {
                    // Récupérer les valeurs
                    const annee = document.getElementById('annee').value;
                    const mois = document.getElementById('mois').value;
                    const donnee = document.getElementById('donnees').value;

                    // Vérifier que tout est sélectionné
                    if (!annee || !mois || !donnee) {
                        alert("Veuillez sélectionner une année, un mois et le type de données !");
                        return;
                    }

                    // Construire le nom du fichier
                    const nomFichier = `../archives/images_monitoring/${donnee}/${annee}_${mois}.png`;

                    // Réinitialiser l'affichage
                    imgElement.style.display = "none";
                    errorElement.style.display = "none";
                    
                    // Assigner la source et gérer l'affichage
                    imgElement.src = nomFichier;

                    // Une fois l'image chargée, on l'affiche
                    imgElement.onload = function() {
                        imgElement.style.display = "block";
                        // On s'assure que le curseur indique qu'on peut cliquer
                        imgElement.style.cursor = "zoom-in"; 
                        errorElement.style.display = "none";
                    };

                    // Gestion d'erreur
                    imgElement.onerror = function() {
                        imgElement.style.display = "none";
                        errorElement.style.display = "block";
                        console.error("Image non trouvée : " + nomFichier);
                    };
                });
            }

            // --- 3. Fonction de Zoom (Clic sur l'image) ---
            if (imgElement && modal) {
                imgElement.addEventListener('click', function() {
                    // On ouvre la modale seulement si l'image est visible
                    if (this.style.display === "block" && this.src) {
                        modal.style.display = "flex"; // Flex pour centrer parfaitement
                        modal.style.justifyContent = "center";
                        modal.style.alignItems = "center";
                        modalImg.src = this.src; // Copie la source de la petite image vers la grande
                    }
                });
            }

            // --- 4. Fermeture de la modale ---
            
            // Fermer avec la croix
            if (closeBtn) {
                closeBtn.addEventListener('click', function() {
                    modal.style.display = "none";
                });
            }

            // Fermer en cliquant sur le fond noir (en dehors de l'image)
            if (modal) {
                modal.addEventListener('click', function(event) {
                    if (event.target === modal) {
                        modal.style.display = "none";
                    }
                });
            }

            // Fermer avec la touche Echap
            document.addEventListener('keydown', function(event) {
                if (event.key === "Escape" && modal && modal.style.display === "flex") {
                    modal.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
